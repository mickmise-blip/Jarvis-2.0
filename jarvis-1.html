<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#050a14;--bg3:rgba(8,18,36,.88);
  --cyan:#00d4ff;--cyan2:rgba(0,212,255,.14);--cyan3:rgba(0,212,255,.06);
  --amber:#ffa040;--green:#00ff9d;--red:#ff4060;
  --text:#c8e0f4;--text2:#4a7296;
  --border:rgba(0,212,255,.16);--glow:0 0 22px rgba(0,212,255,.45)
}
html,body,#root{height:100%;overflow:hidden}
body{background:var(--bg)}
.jr{background:var(--bg);color:var(--text);font-family:'Exo 2',sans-serif;height:100%;display:flex;flex-direction:column;overflow:hidden;position:relative}
.jr::before{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(0,212,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,.025) 1px,transparent 1px);background-size:44px 44px;pointer-events:none;z-index:0}
.jr::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(0,100,180,.12),transparent 65%);pointer-events:none;z-index:0}
.wrap{position:relative;z-index:1;display:flex;flex-direction:column;height:100%}
.hdr{padding:12px 16px;padding-top:max(12px,env(safe-area-inset-top));border-bottom:1px solid var(--border);background:rgba(3,7,16,.95);backdrop-filter:blur(14px);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.logo{font-family:'Orbitron',monospace;font-size:18px;font-weight:900;letter-spacing:5px;color:var(--cyan);text-shadow:0 0 20px rgba(0,212,255,.7)}
.logo span{color:rgba(0,212,255,.35);font-weight:400}
.hdr-r{display:flex;align-items:center;gap:8px}
.hst{font-size:10px;letter-spacing:2px;color:var(--text2);text-transform:uppercase}
.dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);transition:all .3s;flex-shrink:0}
.dot.lis{background:var(--red);box-shadow:0 0 10px var(--red);animation:pulse .5s infinite}
.dot.prc{background:var(--amber);box-shadow:0 0 10px var(--amber);animation:spin .7s linear infinite}
.dot.spk{background:var(--cyan);box-shadow:0 0 10px var(--cyan);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(.75);opacity:.5}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.tabs{display:flex;border-bottom:1px solid var(--border);background:rgba(3,7,16,.97);flex-shrink:0}
.t{flex:1;padding:9px 4px;border:none;background:transparent;color:var(--text2);font-family:'Exo 2',sans-serif;font-size:10px;font-weight:500;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;transition:all .25s;position:relative}
.t.on{color:var(--cyan);text-shadow:0 0 12px var(--cyan)}
.t.on::after{content:'';position:absolute;bottom:0;left:25%;right:25%;height:2px;background:var(--cyan);box-shadow:var(--glow);border-radius:2px}
.ti{font-size:17px}
.scr{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.atab{display:flex;flex-direction:column;height:100%;padding:14px;gap:10px}
.ow{display:flex;flex-direction:column;align-items:center;padding:16px 0 6px;gap:10px;flex-shrink:0}
.oo{position:relative;width:110px;height:110px;cursor:pointer}
.ring{position:absolute;border-radius:50%;border:1px solid var(--cyan);opacity:0;animation:rexp 3s ease-out infinite}
.ring:nth-child(1){inset:-10px;animation-delay:0s}
.ring:nth-child(2){inset:-22px;animation-delay:1s}
.ring:nth-child(3){inset:-34px;animation-delay:2s}
.ring.lis{border-color:var(--red);animation:rexpf .9s ease-out infinite}
.ring.lis:nth-child(2){animation-delay:.3s}
.ring.lis:nth-child(3){animation-delay:.6s}
.ring.prc{border-color:var(--amber);opacity:.55;animation:spin 2.5s linear infinite}
.ring.prc:nth-child(2){animation-direction:reverse;animation-duration:1.8s}
.ring.prc:nth-child(3){opacity:0}
@keyframes rexp{0%{transform:scale(.82);opacity:.65}100%{transform:scale(1.5);opacity:0}}
@keyframes rexpf{0%{transform:scale(.9);opacity:.8}100%{transform:scale(1.35);opacity:0}}
.oc{position:absolute;inset:0;border-radius:50%;background:radial-gradient(circle at 32% 32%,rgba(0,212,255,.28),rgba(0,80,160,.85));border:2px solid var(--cyan);box-shadow:var(--glow),inset 0 0 28px rgba(0,212,255,.18);display:flex;align-items:center;justify-content:center;transition:all .3s;animation:breathe 4s ease-in-out infinite}
.oc.lis{background:radial-gradient(circle at 32% 32%,rgba(255,64,96,.35),rgba(160,0,40,.85));border-color:var(--red);box-shadow:0 0 28px rgba(255,64,96,.5);animation:pfast .6s ease-in-out infinite}
.oc.prc{background:radial-gradient(circle at 32% 32%,rgba(255,160,64,.3),rgba(160,70,0,.85));border-color:var(--amber);box-shadow:0 0 28px rgba(255,160,64,.45);animation:none}
.oc.spk{animation:pspk .35s ease-in-out infinite alternate}
@keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
@keyframes pfast{0%,100%{transform:scale(1)}50%{transform:scale(1.07)}}
@keyframes pspk{from{transform:scale(1)}to{transform:scale(1.06)}}
.oi{font-size:32px;user-select:none}
.slb{font-family:'Orbitron',monospace;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--cyan);text-shadow:0 0 10px var(--cyan);min-height:14px}
.hint{font-size:11px;color:var(--text2);text-align:center;letter-spacing:.5px;min-height:16px}
.ma{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:10px;padding-bottom:4px;-webkit-overflow-scrolling:touch}
.emp{text-align:center;padding:24px 16px;color:var(--text2);font-size:13px;line-height:2}
.emp span{color:var(--cyan)}
.msg{display:flex;flex-direction:column;gap:3px;animation:mapr .3s ease-out}
@keyframes mapr{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.mu{align-items:flex-end}.mai{align-items:flex-start}
.ml{font-size:9px;letter-spacing:2.5px;color:var(--text2);font-family:'Orbitron',monospace;padding:0 4px}
.mb{max-width:88%;padding:9px 13px;border-radius:12px;font-size:14px;line-height:1.55;backdrop-filter:blur(8px)}
.mu .mb{background:var(--cyan2);border:1px solid rgba(0,212,255,.28);border-bottom-right-radius:3px}
.mai .mb{background:rgba(8,20,44,.82);border:1px solid var(--border);border-bottom-left-radius:3px}
.mt{font-size:10px;color:var(--text2);padding:0 4px}
.dots span{animation:blink 1.3s infinite;font-size:18px;color:var(--cyan)}
.dots span:nth-child(2){animation-delay:.43s}
.dots span:nth-child(3){animation-delay:.86s}
@keyframes blink{0%,80%,100%{opacity:0}40%{opacity:1}}
.tb{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:9px 13px;font-size:13px;color:var(--text);font-style:italic;flex-shrink:0}
.warn{background:rgba(255,160,64,.08);border:1px solid rgba(255,160,64,.28);border-radius:8px;padding:9px 12px;font-size:12px;color:var(--amber);line-height:1.5;flex-shrink:0}
.ir{display:flex;gap:8px;flex-shrink:0}
.ii{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 13px;color:var(--text);font-family:'Exo 2',sans-serif;font-size:14px;outline:none;transition:border-color .25s}
.ii:focus{border-color:var(--cyan);box-shadow:0 0 0 2px var(--cyan2)}
.ii::placeholder{color:var(--text2)}
.sb{background:var(--cyan);border:none;border-radius:8px;width:44px;color:var(--bg);font-size:17px;cursor:pointer;transition:all .2s;flex-shrink:0}
.sb:hover{background:#33ddff;box-shadow:var(--glow)}
.sb:disabled{opacity:.35;cursor:not-allowed}
.ntab{padding:14px;display:flex;flex-direction:column;gap:12px}
.nrow{display:flex;justify-content:space-between;align-items:center}
.stitle{font-family:'Orbitron',monospace;font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--cyan)}
.rb{background:var(--cyan2);border:1px solid var(--border);border-radius:6px;padding:6px 11px;color:var(--cyan);font-family:'Exo 2',sans-serif;font-size:12px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:5px}
.rb:hover{background:rgba(0,212,255,.22);box-shadow:var(--glow)}
.rb:disabled{opacity:.35;cursor:not-allowed}
.lb{height:2px;background:linear-gradient(90deg,transparent,var(--cyan),transparent);background-size:200% 100%;animation:lswp 1.4s infinite;border-radius:2px}
@keyframes lswp{0%{background-position:-100% 0}100%{background-position:200% 0}}
.cats{display:flex;gap:7px;flex-wrap:wrap}
.cb{padding:4px 11px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text2);font-family:'Exo 2',sans-serif;font-size:11px;cursor:pointer;transition:all .2s}
.cb.on{background:var(--cyan2);border-color:var(--cyan);color:var(--cyan)}
.nc{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:13px;backdrop-filter:blur(8px);transition:border-color .2s;animation:mapr .35s ease-out}
.nc:hover{border-color:rgba(0,212,255,.35)}
.nc.hi{border-left:3px solid var(--amber)}
.ncat{font-family:'Orbitron',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--cyan);margin-bottom:5px}
.nc.hi .ncat{color:var(--amber)}
.ntl{font-weight:600;font-size:14px;line-height:1.4;color:var(--text);margin-bottom:5px}
.nsu{font-size:12px;color:var(--text2);line-height:1.55;margin-bottom:7px}
.nm{display:flex;justify-content:space-between;font-size:11px;color:var(--text2)}
.nsrc{color:var(--cyan);opacity:.65}
.nn{text-align:center;padding:44px 20px;color:var(--text2);font-size:13px;line-height:2.2}
.nn span{color:var(--cyan)}
.ptab{padding:14px;display:flex;flex-direction:column;gap:14px}
.pc{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:15px;backdrop-filter:blur(8px)}
.ph{display:flex;align-items:center;gap:13px;margin-bottom:12px}
.av{width:50px;height:50px;border-radius:50%;background:radial-gradient(circle at 32% 32%,var(--cyan2),rgba(0,40,90,.85));border:2px solid var(--cyan);box-shadow:var(--glow);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.pn{font-family:'Orbitron',monospace;font-size:15px;color:var(--cyan);font-weight:700}
.ps{font-size:11px;color:var(--text2);margin-top:2px}
.sr{display:flex;gap:10px;margin-top:12px}
.sbox{flex:1;background:var(--cyan3);border:1px solid var(--border);border-radius:8px;padding:9px;text-align:center}
.sv{font-family:'Orbitron',monospace;font-size:21px;color:var(--cyan);font-weight:700}
.sl{font-size:9px;color:var(--text2);letter-spacing:1px;text-transform:uppercase;margin-top:2px}
.tgs{display:flex;flex-wrap:wrap;gap:7px}
.tg{background:var(--cyan2);border:1px solid var(--border);border-radius:20px;padding:5px 11px;font-size:12px;color:var(--text);display:flex;align-items:center;gap:5px;transition:border-color .2s}
.tg:hover{border-color:rgba(0,212,255,.4)}
.tg.lg{border-color:rgba(0,255,157,.2);background:rgba(0,255,157,.05)}
.tr{cursor:pointer;color:var(--text2);font-size:15px;line-height:1;transition:color .2s}
.tr:hover{color:var(--red)}
.ar{display:flex;gap:7px;margin-top:10px}
.ai{flex:1;background:rgba(5,12,25,.9);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-family:'Exo 2',sans-serif;font-size:13px;outline:none}
.ai:focus{border-color:var(--cyan)}
.ai::placeholder{color:var(--text2)}
.ab{background:var(--cyan2);border:1px solid var(--border);border-radius:8px;padding:8px 13px;color:var(--cyan);font-family:'Exo 2',sans-serif;font-size:12px;cursor:pointer;transition:all .2s;white-space:nowrap}
.ab:hover{background:rgba(0,212,255,.22)}
.rsb{background:transparent;border:1px solid rgba(255,64,96,.25);border-radius:8px;padding:10px;color:rgba(255,64,96,.6);font-family:'Exo 2',sans-serif;font-size:11px;letter-spacing:1px;cursor:pointer;transition:all .2s;text-align:center;width:100%}
.rsb:hover{background:rgba(255,64,96,.08);border-color:var(--red);color:var(--red)}
</style>

<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;

const MODEL = 'claude-sonnet-4-20250514';
const LS_KEY = 'jarvis_v4';
const DEF = {
  interests: ['Finanzen & Maerkte', 'Politik & Sicherheit'],
  conversationCount: 0,
  learnedTopics: []
};

const ts = () => new Date().toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });

const JARVIS_SYS = (interests) =>
  'Du bist J.A.R.V.I.S., ein hochintelligenter persoenlicher KI-Assistent.\n' +
  'Kommuniziere ausschliesslich auf Deutsch. Sei praezise und direkt.\n' +
  '2-4 Saetze fuer einfache Fragen, ausfuehrlicher fuer komplexe. Kein Markdown.\n' +
  'Nutzerinteressen: ' + interests.join(', ') + '.';

const NEWS_SYS = (topics) =>
  'Du bist ein Nachrichten-Aggregator. Heute: ' + new Date().toLocaleDateString('de-DE') + '.\n' +
  'Suche aktuelle Nachrichten zu: ' + topics + '.\n' +
  'Antworte NUR mit JSON-Array (kein Text darum):\n' +
  '[{"title":"...","summary":"...","category":"Finanzen|Maerkte|Politik|Sicherheit","source":"...","urgency":"normal|high","time":"vor X Min/Std"}]\n' +
  'Genau 6 aktuelle Nachrichten.';

const EXT_SYS =
  'Extrahiere max. 2 neue Themen/Interessen aus dem Gespraech. Nur wirklich neue.\n' +
  'Antworte NUR mit JSON: ["Thema"] oder [].';

async function callAPI(messages, system, useSearch) {
  const body = { model: MODEL, max_tokens: 1000, system: system, messages: messages };
  if (useSearch) body.tools = [{ type: 'web_search_20250305', name: 'web_search' }];
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  const data = await res.json();
  if (data.error) throw new Error(data.error.message);
  return data.content.filter(b => b.type === 'text').map(b => b.text).join('').trim();
}

function App() {
  const [tab, setTab] = useState('a');
  const [vm, setVm] = useState('idle');
  const [trans, setTrans] = useState('');
  const [msgs, setMsgs] = useState([]);
  const [inp, setInp] = useState('');
  const [busy, setBusy] = useState(false);
  const [news, setNews] = useState([]);
  const [nl, setNl] = useState(false);
  const [nc, setNc] = useState('all');
  const [prof, setProf] = useState(DEF);
  const [ni, setNi] = useState('');
  const [mErr, setMErr] = useState(false);

  const recR = useRef(null);
  const convR = useRef([]);
  const wakeR = useRef(false);
  const cmdR = useRef(false);
  const bufR = useRef('');
  const tmR = useRef(null);
  const runR = useRef(false);
  const busyR = useRef(false);
  const profR = useRef(prof);
  const aspR = useRef(null);
  const endR = useRef(null);

  useEffect(() => { profR.current = prof; }, [prof]);
  useEffect(() => { busyR.current = busy; }, [busy]);

  useEffect(() => {
    try {
      const saved = localStorage.getItem(LS_KEY);
      if (saved) {
        const d = JSON.parse(saved);
        if (d.profile) setProf(d.profile);
        if (d.messages && d.messages.length) {
          const m = d.messages.slice(-40);
          setMsgs(m);
          convR.current = m.slice(-8).map(x => ({ role: x.role, content: x.content }));
        }
      }
    } catch(e) {}

    const mfData = { name: 'J.A.R.V.I.S.', short_name: 'JARVIS', start_url: '.', display: 'standalone', background_color: '#050a14', theme_color: '#050a14' };
    document.getElementById('mf').href = 'data:application/manifest+json,' + encodeURIComponent(JSON.stringify(mfData));

    return () => {
      runR.current = false;
      if (recR.current) { try { recR.current.abort(); } catch(e) {} }
      if (window.speechSynthesis) window.speechSynthesis.cancel();
      clearTimeout(tmR.current);
    };
  }, []);

  useEffect(() => {
    if (endR.current) endR.current.scrollIntoView({ behavior: 'smooth' });
  }, [msgs.length]);

  const save = (m, p) => {
    try { localStorage.setItem(LS_KEY, JSON.stringify({ messages: m.slice(-40), profile: p })); } catch(e) {}
  };

  const speak = (text) => {
    const synth = window.speechSynthesis;
    if (!synth) { const cb = aspR.current; aspR.current = null; if (cb) cb(); return; }
    synth.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'de-DE'; u.rate = 1.05; u.pitch = 0.88;
    const setVoice = () => { const dv = synth.getVoices().find(v => v.lang.startsWith('de')); if (dv) u.voice = dv; };
    setVoice();
    if (synth.getVoices().length === 0) synth.onvoiceschanged = () => { setVoice(); synth.onvoiceschanged = null; };
    u.onstart = () => setVm('speak');
    u.onend = () => { setVm('idle'); const cb = aspR.current; aspR.current = null; if (cb) cb(); };
    u.onerror = () => { const cb = aspR.current; aspR.current = null; if (cb) cb(); };
    synth.speak(u);
  };

  const extractInter = async (uTxt, aTxt) => {
    try {
      const r = await callAPI([{ role: 'user', content: 'N: "' + uTxt.slice(0,80) + '"\nA: "' + aTxt.slice(0,80) + '"' }], EXT_SYS, false);
      const clean = r.replace(/```[a-z]*\n?|```/g, '');
      const m = clean.match(/\[[\s\S]*\]/);
      if (!m) return;
      const t = JSON.parse(m[0]);
      if (!Array.isArray(t) || !t.length) return;
      setProf(p => {
        const lo = p.interests.map(i => i.toLowerCase());
        const fresh = t.filter(x => !lo.includes(x.toLowerCase()));
        if (!fresh.length) return p;
        return { ...p, interests: [...p.interests, ...fresh].slice(-20), learnedTopics: [...(p.learnedTopics || []), ...fresh].slice(-12) };
      });
    } catch(e) {}
  };

  const sendMsg = async (text, fromVoice) => {
    if (!text.trim() || busyR.current) return;
    busyR.current = true; setBusy(true);
    if (!fromVoice) setVm('proc');
    const t = ts();
    setMsgs(prev => [...prev, { id: Date.now(), role: 'user', content: text.trim(), time: t }]);
    setInp('');
    const hist = [...convR.current, { role: 'user', content: text.trim() }];
    try {
      const reply = await callAPI(hist, JARVIS_SYS(profR.current.interests), true);
      const am = { id: Date.now() + 1, role: 'assistant', content: reply, time: ts() };
      convR.current = [...hist, { role: 'assistant', content: reply }].slice(-8);
      setMsgs(prev => {
        const u = [...prev, am];
        setProf(p => { const np = { ...p, conversationCount: p.conversationCount + 1 }; save(u, np); return np; });
        return u;
      });
      if (fromVoice) speak(reply); else setVm('idle');
      extractInter(text, reply);
    } catch(e) {
      setMsgs(prev => [...prev, { id: Date.now(), role: 'assistant', content: 'Verbindungsfehler - bitte erneut versuchen.', time: t }]);
      setVm('idle');
      const cb = aspR.current; aspR.current = null; if (cb) cb();
    }
    busyR.current = false; setBusy(false);
  };

  const fireCmd = () => {
    const cmd = bufR.current.trim();
    if (!runR.current && !cmdR.current && !cmd) return;
    runR.current = false; cmdR.current = false;
    clearTimeout(tmR.current);
    if (recR.current) { try { recR.current.abort(); } catch(e) {} }
    bufR.current = ''; setTrans('');
    if (cmd.length < 2) { setVm('idle'); return; }
    setVm('proc');
    if (wakeR.current) aspR.current = () => startWake();
    sendMsg(cmd, true);
  };

  const makeRec = (isManual) => {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { setMErr(true); return null; }
    const rec = new SR();
    rec.continuous = true; rec.interimResults = true; rec.lang = 'de-DE';

    rec.onresult = (e) => {
      let fin = '', inter = '';
      for (let i = e.resultIndex; i < e.results.length; i++) {
        const txt = e.results[i][0].transcript;
        if (e.results[i].isFinal) fin += txt; else inter += txt;
      }
      if (isManual) {
        setTrans(fin || inter);
        if (fin) {
          bufR.current = bufR.current ? bufR.current + ' ' + fin : fin;
          clearTimeout(tmR.current);
          tmR.current = setTimeout(fireCmd, 1800);
        }
      } else {
        const lo = (fin || inter).toLowerCase();
        if (!cmdR.current && lo.includes('jarvis')) {
          cmdR.current = true; bufR.current = '';
          setVm('listen'); setTrans('');
          speak('Ja, ich hoere.');
          const after = fin.toLowerCase().replace(/.*jarvis\s*/i, '').trim();
          if (after.length > 3) {
            bufR.current = after;
            clearTimeout(tmR.current);
            tmR.current = setTimeout(fireCmd, 2000);
          }
        } else if (cmdR.current) {
          setTrans(fin || inter);
          if (fin) {
            bufR.current = bufR.current ? bufR.current + ' ' + fin : fin;
            clearTimeout(tmR.current);
            tmR.current = setTimeout(fireCmd, 1800);
          }
        }
      }
    };

    rec.onerror = (e) => {
      if (e.error === 'not-allowed') {
        setMErr(true); setVm('idle'); runR.current = false; wakeR.current = false;
      } else if (e.error !== 'aborted' && runR.current) {
        setTimeout(() => { try { rec.start(); } catch(err) {} }, 800);
      }
    };

    rec.onend = () => {
      if (runR.current) {
        if (isManual) { fireCmd(); }
        else { setTimeout(() => { try { rec.start(); } catch(err) {} }, 500); }
      }
    };
    return rec;
  };

  const startWake = () => {
    if (recR.current) { try { recR.current.abort(); } catch(e) {} }
    const rec = makeRec(false);
    if (!rec) return;
    recR.current = rec;
    wakeR.current = true; cmdR.current = false; runR.current = true; bufR.current = '';
    try { rec.start(); setVm('wake'); setMErr(false); } catch(e) { setMErr(true); }
  };

  const startListen = () => {
    if (recR.current) { try { recR.current.abort(); } catch(e) {} }
    const rec = makeRec(true);
    if (!rec) return;
    recR.current = rec;
    wakeR.current = false; cmdR.current = false; bufR.current = ''; runR.current = true;
    try {
      rec.start(); setVm('listen'); setTrans(''); setMErr(false);
      clearTimeout(tmR.current);
      tmR.current = setTimeout(fireCmd, 7000);
    } catch(e) { setMErr(true); }
  };

  const orbClick = () => {
    if (vm === 'idle') startWake();
    else if (vm === 'wake') startListen();
    else if (vm === 'listen') { clearTimeout(tmR.current); fireCmd(); }
    else if (vm === 'speak') { if (window.speechSynthesis) window.speechSynthesis.cancel(); setVm('idle'); }
  };

  const loadNews = async () => {
    setNl(true);
    try {
      const topics = profR.current.interests.slice(0, 5).join(', ');
      const r = await callAPI([{ role: 'user', content: 'News-Feed fuer heute: ' + topics }], NEWS_SYS(topics), true);
      const clean = r.replace(/```[a-z]*\n?|```/g, '');
      const m = clean.match(/\[[\s\S]*\]/);
      if (m) setNews(JSON.parse(m[0]));
    } catch(e) {}
    setNl(false);
  };

  const addI = () => {
    const v = ni.trim();
    if (!v || prof.interests.includes(v)) return;
    setProf(p => ({ ...p, interests: [...p.interests, v] }));
    setNi('');
  };
  const remI = (i) => setProf(p => ({ ...p, interests: p.interests.filter(x => x !== i) }));
  const resetAll = () => {
    if (!confirm('Alle Daten zuruecksetzen?')) return;
    setProf(DEF); setMsgs([]); setNews([]); convR.current = [];
    localStorage.removeItem(LS_KEY);
  };

  const filteredNews = news.filter(n => {
    if (nc === 'all') return true;
    const c = (n.category || '').toLowerCase();
    return nc === 'f'
      ? c.includes('finanz') || c.includes('markt') || c.includes('wirtschaft')
      : c.includes('polit') || c.includes('sicher');
  });

  const LABELS = { idle: 'BEREIT', wake: 'WARTE AUF HEY JARVIS', listen: 'HOERE ZU...', proc: 'VERARBEITE...', speak: 'SPRICHT...' };
  const HINTS  = { idle: 'Tippe zum Aktivieren', wake: '"Hey Jarvis" sagen oder antippen', listen: 'Spreche jetzt - antippen zum Senden', speak: 'Antippen zum Stoppen', proc: '' };
  const ICONS  = { idle: '🤖', wake: '👂', listen: '🎙️', proc: '⚡', speak: '💬' };
  const ringC  = (vm === 'listen' || vm === 'wake') ? 'lis' : vm === 'proc' ? 'prc' : '';
  const orbC   = vm === 'listen' ? 'lis' : vm === 'proc' ? 'prc' : vm === 'speak' ? 'spk' : '';
  const dotC   = { idle: '', wake: 'lis', listen: 'lis', proc: 'prc', speak: 'spk' }[vm];
  const hasSR  = !!(window.SpeechRecognition || window.webkitSpeechRecognition);

  return (
    <div className="jr">
      <div className="wrap">

        <div className="hdr">
          <div className="logo">JARVIS<span>.AI</span></div>
          <div className="hdr-r">
            {vm !== 'idle' && <span className="hst">{LABELS[vm]}</span>}
            <div className={'dot ' + dotC}></div>
          </div>
        </div>

        <div className="tabs">
          {[['a','🤖','Assistent'],['n','📡','News'],['p','👤','Profil']].map(([id, ico, lbl]) => (
            <button key={id} className={'t' + (tab === id ? ' on' : '')} onClick={() => setTab(id)}>
              <span className="ti">{ico}</span>{lbl}
            </button>
          ))}
        </div>

        {/* ASSISTENT */}
        <div className="scr" style={{ display: tab === 'a' ? 'flex' : 'none', flexDirection: 'column' }}>
          <div className="atab">
            <div className="ow">
              <div className="oo" onClick={orbClick}>
                <div className={'ring ' + ringC}></div>
                <div className={'ring ' + ringC}></div>
                <div className={'ring ' + ringC}></div>
                <div className={'oc ' + orbC}>
                  <span className="oi">{ICONS[vm]}</span>
                </div>
              </div>
              <div className="slb">{LABELS[vm]}</div>
              <div className="hint">{!mErr && hasSR ? HINTS[vm] : ''}</div>
            </div>

            {(mErr || !hasSR) && (
              <div className="warn">⚠️ Mikrofonzugriff nicht verfuegbar. Bitte erlaube Mikrofon im Browser oder nutze Texteingabe.</div>
            )}
            {trans && <div className="tb">&bdquo;{trans}&ldquo;</div>}

            <div className="ma">
              {msgs.length === 0 && (
                <div className="emp">Starte eine Konversation<br/>oder sage <span>"Hey Jarvis"</span></div>
              )}
              {msgs.map(m => (
                <div key={m.id} className={'msg ' + (m.role === 'user' ? 'mu' : 'mai')}>
                  <div className="ml">{m.role === 'user' ? 'DU' : 'JARVIS'}</div>
                  <div className="mb">{m.content}</div>
                  <div className="mt">{m.time}</div>
                </div>
              ))}
              {busy && (
                <div className="msg mai">
                  <div className="ml">JARVIS</div>
                  <div className="mb dots"><span>&#9679;</span><span>&#9679;</span><span>&#9679;</span></div>
                </div>
              )}
              <div ref={endR}></div>
            </div>

            <div className="ir">
              <input className="ii" placeholder="Nachricht eingeben..." value={inp}
                onChange={e => setInp(e.target.value)}
                onKeyDown={e => e.key === 'Enter' && sendMsg(inp, false)}
                disabled={busy} />
              <button className="sb" onClick={() => sendMsg(inp, false)} disabled={busy || !inp.trim()}>&#10148;</button>
            </div>
          </div>
        </div>

        {/* NEWS */}
        <div className="scr" style={{ display: tab === 'n' ? 'block' : 'none' }}>
          <div className="ntab">
            <div className="nrow">
              <div className="stitle">NEWS-FEED</div>
              <button className="rb" onClick={loadNews} disabled={nl}>
                {nl ? 'Laedt...' : '🔄 Aktualisieren'}
              </button>
            </div>
            {nl && <div className="lb"></div>}
            <div className="cats">
              {[['all','Alle'],['f','💹 Finanzen'],['p','🏛️ Politik']].map(([id, lbl]) => (
                <button key={id} className={'cb' + (nc === id ? ' on' : '')} onClick={() => setNc(id)}>{lbl}</button>
              ))}
            </div>
            {filteredNews.length === 0 && !nl ? (
              <div className="nn">Noch keine News geladen.<br/>Tippe auf <span>Aktualisieren</span><br/>fuer deinen personalisierten Feed.</div>
            ) : filteredNews.map((n, i) => (
              <div key={i} className={'nc' + (n.urgency === 'high' ? ' hi' : '')}>
                <div className="ncat">{n.category}{n.urgency === 'high' ? ' 🔴' : ''}</div>
                <div className="ntl">{n.title}</div>
                <div className="nsu">{n.summary}</div>
                <div className="nm"><span className="nsrc">{n.source}</span><span>{n.time}</span></div>
              </div>
            ))}
          </div>
        </div>

        {/* PROFIL */}
        <div className="scr" style={{ display: tab === 'p' ? 'block' : 'none' }}>
          <div className="ptab">
            <div className="pc">
              <div className="ph">
                <div className="av">🤵</div>
                <div>
                  <div className="pn">NUTZER-PROFIL</div>
                  <div className="ps">J.A.R.V.I.S. Persoenlichkeitsprofil</div>
                </div>
              </div>
              <div className="sr">
                {[['Gespraeche', prof.conversationCount], ['Interessen', prof.interests.length], ['Gelernt', (prof.learnedTopics || []).length]].map(([l, v]) => (
                  <div key={l} className="sbox"><div className="sv">{v}</div><div className="sl">{l}</div></div>
                ))}
              </div>
            </div>

            <div className="pc">
              <div className="stitle" style={{ marginBottom: '12px' }}>INTERESSEN &amp; THEMEN</div>
              <div className="tgs">
                {prof.interests.map(x => (
                  <div key={x} className="tg">{x}<span className="tr" onClick={() => remI(x)}>&#215;</span></div>
                ))}
              </div>
              <div className="ar">
                <input className="ai" placeholder="Neues Interesse..." value={ni}
                  onChange={e => setNi(e.target.value)}
                  onKeyDown={e => e.key === 'Enter' && addI()} />
                <button className="ab" onClick={addI}>+ Hinzufuegen</button>
              </div>
            </div>

            {(prof.learnedTopics || []).length > 0 && (
              <div className="pc">
                <div className="stitle" style={{ marginBottom: '12px' }}>AUTOMATISCH GELERNT ✨</div>
                <div className="tgs">
                  {(prof.learnedTopics || []).map(t => <div key={t} className="tg lg">&#10022; {t}</div>)}
                </div>
              </div>
            )}

            <button className="rsb" onClick={resetAll}>⚠️ Alle Daten zuruecksetzen</button>
          </div>
        </div>

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
